<main><section class="hero"><h2>Inboxに入れる</h2><p>雑に書く。ボタンを押すと、ChatGPTやClaudeに渡す整理プロンプトが出る。</p><textarea id="inboxText" class="inputbox" placeholder="例：Hondaの経営戦略をもう一段深く見たい。Toyota・Nissan比較も入れたい。"></textarea><button onclick="buildInboxPrompt()">整理プロンプトを作る</button> <button class="copy" onclick="copyPrompt('inboxPrompt')">コピー</button><pre id="inboxPrompt">ここに整理プロンプトが出る。</pre></section>
<section class="section"><h2>分類ルール</h2><ul><li>企業・決算・戦略 → 経営脳</li><li>採用・組織・福利厚生 → 人事脳</li><li>求人・候補者・案件推進 → 人材市場脳</li><li>株・IPO・資本政策 → 投資脳</li><li>英語・グロービス・復習 → 学習脳</li><li>サウナ・キャンプ・飲食店 → 体験設計脳</li></ul></section></main><script src="script.js"></script></body></html>

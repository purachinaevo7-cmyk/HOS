id: hr_strategy_review
name: HR Strategy Review
version: "2.1.0"
max_rework_cycles: 2
outputs:
  final_report: outputs/reports/{task_id}.md
  hos_update_json: outputs/json/{task_id}.json
steps:
  - id: ceo_plan
    name: CEO Plan
    agent: ceo
    action: plan
    depends_on: []
    output_key: ceo_plan
    condition: always
    validation: {json_only: true}
    retry_policy: {max_attempts: 1}
    timeout_seconds: 30
    concurrency_group: planning
  - id: research
    agent: researcher
    action: research
    depends_on: [ceo_plan]
    output_key: research
    concurrency_group: research
  - id: base_analysis
    agent: analyst
    action: analyze
    depends_on: [research]
    output_key: base_analysis
    retry_policy: {max_attempts: 2}
  - id: creative_challenge
    agent: creative_challenger
    action: challenge
    depends_on: [base_analysis]
    output_key: creative_challenge
  - id: market_research
    agent: market_analyst
    action: research_market
    depends_on: [ceo_plan]
    output_key: market_research
    concurrency_group: research
  - id: financial_research
    agent: financial_analyst
    action: research_financials
    depends_on: [ceo_plan]
    output_key: financial_research
    concurrency_group: research
  - id: industry_research
    agent: industry_analyst
    action: research_industry
    depends_on: [ceo_plan]
    output_key: industry_research
    concurrency_group: research
  - id: devils_advocate
    agent: devils_advocate
    action: oppose
    depends_on: [creative_challenge]
    output_key: devils_advocate
  - id: risk_review
    agent: risk_reviewer
    action: review
    depends_on: [devils_advocate]
    output_key: risk_review
  - id: fact_review
    agent: fact_reviewer
    action: review
    depends_on: [risk_review]
    output_key: fact_review
  - id: logic_review
    agent: logic_reviewer
    action: review
    depends_on: [fact_review]
    output_key: logic_review
  - id: quality_review
    agent: quality_reviewer
    action: review
    depends_on: [logic_review]
    output_key: quality_review
  - id: hos_writer
    agent: hos_writer
    action: prepare_hos_update
    depends_on: [quality_review]
    output_key: hos_update
  - id: ceo_integrate
    agent: ceo_integrator
    action: integrate_final
    depends_on: [hos_writer]
    output_key: ceo_integration
  - id: reflection
    agent: reflection_agent
    action: reflect
    depends_on: [ceo_integrate]
    output_key: reflection

name: investment_analysis
version: 1
max_reruns: 2
design_principles:
  operating_model: HOS AI Company
  ceo_role:
    - request_clarification
    - assignment
    - quality_judgment
    - final_integration
  agent_output_format: json_only
  markdown_owner: ceo
  communication: orchestrator_only
  dependency_source: workflow_only
  extension_model: plugin_agents
  target_agent_scale: 100
artifact_paths:
  report_dir: outputs/reports
  json_dir: outputs/json
  log_dir: logs
agents:
  - ceo
  - researcher
  - analyst
  - creative_challenger
  - risk_reviewer
  - quality_reviewer
  - hos_writer
steps:
  - id: plan
    agent: ceo
  - id: research
    agent: researcher
  - id: analyze
    agent: analyst
  - id: creative_challenge
    agent: creative_challenger
  - id: risk_review
    agent: risk_reviewer
  - id: quality_review
    agent: quality_reviewer
    on_reject: rerun_agent
  - id: write_hos
    agent: hos_writer
outputs:
  final_report: outputs/reports/{task_id}.md
  hos_update_json: outputs/json/{task_id}.json

id: investment_analysis
name: investment_analysis
version: "2.0.0"
max_rework_cycles: 2
outputs:
  final_report: outputs/reports/{task_id}.md
  hos_update_json: outputs/json/{task_id}.json
steps:
  - id: ceo_planning
    agent: ceo
    action: plan
    depends_on: []
    input_mapping: {task: task}
    output_key: ceo_plan
    condition: always
    validation: {json_only: true}
    retry_policy: {max_attempts: 1}
    timeout_seconds: 30
    continue_on_error: false
  - id: research
    agent: researcher
    action: research
    depends_on: [ceo_planning]
    input_mapping: {task: task, ceo_plan: outputs.ceo_plan}
    output_key: research
    condition: always
    validation: {json_only: true}
    retry_policy: {max_attempts: 1}
    timeout_seconds: 30
    continue_on_error: false
  - id: base_analysis
    agent: analyst
    action: analyze
    depends_on: [research]
    input_mapping: {research: outputs.research}
    output_key: base_analysis
    condition: always
    validation: {json_only: true}
    retry_policy: {max_attempts: 2}
    timeout_seconds: 30
    continue_on_error: false
  - id: creative_challenge
    agent: creative_challenger
    action: challenge
    depends_on: [base_analysis]
    input_mapping: {base_analysis: outputs.base_analysis, research: outputs.research}
    output_key: creative_challenge
    condition: always
    validation: {json_only: true}
    retry_policy: {max_attempts: 1}
    timeout_seconds: 30
    continue_on_error: false
  - id: devils_advocate
    agent: devils_advocate
    action: oppose
    depends_on: [creative_challenge]
    input_mapping: {base_analysis: outputs.base_analysis, creative_challenge: outputs.creative_challenge}
    output_key: devils_advocate
    condition: always
    validation: {json_only: true}
    retry_policy: {max_attempts: 1}
    timeout_seconds: 30
    continue_on_error: false
  - id: risk_review
    agent: risk_reviewer
    action: review
    depends_on: [devils_advocate]
    input_mapping: {}
    output_key: risk_review
    condition: always
    validation: {review_schema: true}
    retry_policy: {max_attempts: 1}
    timeout_seconds: 30
    continue_on_error: false
  - id: fact_review
    agent: fact_reviewer
    action: review
    depends_on: [risk_review]
    input_mapping: {}
    output_key: fact_review
    condition: always
    validation: {review_schema: true}
    retry_policy: {max_attempts: 1}
    timeout_seconds: 30
    continue_on_error: false
  - id: logic_review
    agent: logic_reviewer
    action: review
    depends_on: [fact_review]
    input_mapping: {}
    output_key: logic_review
    condition: always
    validation: {review_schema: true}
    retry_policy: {max_attempts: 1}
    timeout_seconds: 30
    continue_on_error: false
  - id: quality_review
    agent: quality_reviewer
    action: review
    depends_on: [logic_review]
    input_mapping: {}
    output_key: quality_review
    condition: always
    validation: {review_schema: true}
    retry_policy: {max_attempts: 1}
    timeout_seconds: 30
    continue_on_error: false
  - id: hos_writer
    agent: hos_writer
    action: prepare_hos_update
    depends_on: [quality_review]
    input_mapping: {}
    output_key: hos_update
    condition: always
    validation: {json_only: true, no_markdown: true}
    retry_policy: {max_attempts: 1}
    timeout_seconds: 30
    continue_on_error: false

name: HOS AI Company
on:
  workflow_dispatch:
    inputs:
      task_json:
        description: 'Task JSON payload (preferred)'
        required: false
        type: string
      task_path:
        description: 'Repository task path under tasks/, e.g. tasks/inbox/FACT-285A-RETRY-001.json (do not enter only the filename)'
        required: false
        default: 'tasks/inbox/FACT-285A-RETRY-001.json'
        type: string
      workflow:
        description: 'Workflow id override for generated task_json only'
        required: false
        default: 'investment_analysis_verified_lite'
        type: string
      analysis_mode:
        description: 'Analysis mode'
        required: true
        default: 'verified_lite'
        type: choice
        options: [smoke, verified_lite, full_5_agent]
      fact_pack_only:
        description: 'Generate Fact Pack artifacts without Gemini calls'
        required: true
        default: false
        type: boolean
      enable_network_facts:
        description: 'Enable free network fact providers for verified investment data'
        required: true
        default: false
        type: boolean
      fact_mode:
        description: 'Fact acquisition mode'
        required: true
        default: 'cached_only'
        type: choice
        options: [cached_only, network_verified]
      executor:
        description: 'Executor: mock, gemini, or openai'
        required: true
        default: 'mock'
        type: choice
        options: [mock, gemini, openai]
      dry_run:
        description: 'Dry run without legacy artifact writes'
        required: true
        default: false
        type: boolean
      max_parallel_agents:
        description: 'Reserved; max parallel agents'
        required: false
        default: '3'
        type: string
      gemini_timeout_seconds:
        description: 'Gemini request timeout seconds (30-300)'
        required: false
        default: '90'
        type: string
      gemini_smoke_test:
        description: 'Run one Gemini structured-output smoke call only'
        required: true
        default: false
        type: boolean
permissions:
  contents: read
jobs:
  run-hos-ai-company:
    runs-on: ubuntu-latest
    env:
      HOS_EXECUTOR: ${{ inputs.executor }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
      GEMINI_MAX_OUTPUT_TOKENS_DEFAULT: '2048'
      GEMINI_MAX_OUTPUT_TOKENS_CEO: '3000'
      GEMINI_TIMEOUT_SECONDS: ${{ inputs.gemini_timeout_seconds || '90' }}
      HOS_FREE_TIER_MODE: ${{ inputs.executor == 'gemini' && 'true' || '' }}
      HOS_MAX_AGENT_CALLS: ${{ inputs.executor == 'gemini' && inputs.analysis_mode == 'verified_lite' && '2' || inputs.executor == 'gemini' && '5' || '' }}
      HOS_MAX_RETRIES: ${{ inputs.executor == 'gemini' && '1' || '' }}
      HOS_MAX_PARALLEL_AGENTS: ${{ inputs.max_parallel_agents }}
      HOS_FACT_MODE: ${{ inputs.fact_mode }}
      HOS_ENABLE_NETWORK_FACTS: ${{ inputs.enable_network_facts == true && inputs.fact_mode == 'network_verified' && 'true' || 'false' }}
      HOS_FACT_PACK_ONLY: ${{ inputs.fact_pack_only == true && 'true' || 'false' }}
      HOS_VERIFIED_LITE_MAX_CALLS: '2'
      HOS_MAX_VERIFIED_ANALYSES_PER_DAY: '3'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Prepare task
        shell: python
        run: |
          import json, os, pathlib, sys
          raw = '''${{ inputs.task_json }}'''.strip()
          if raw:
              data=json.loads(raw)
              mode='${{ inputs.analysis_mode }}'
              wf={'smoke':'investment_analysis_free','verified_lite':'investment_analysis_verified_lite','full_5_agent':'investment_analysis'}.get(mode,'investment_analysis_verified_lite')
              data['workflow']=wf
              data['requested_fact_pack_only']=json.loads('''${{ toJson(inputs.fact_pack_only) }}''')
              data['effective_fact_pack_only']=json.loads('''${{ toJson(inputs.fact_pack_only) }}''')
              data['fact_pack_only']=json.loads('''${{ toJson(inputs.fact_pack_only) }}''')
              p=pathlib.Path('tasks/working/actions-task.json'); p.parent.mkdir(parents=True,exist_ok=True); p.write_text(json.dumps(data,ensure_ascii=False,indent=2),encoding='utf-8')
              print('TASK_FILE=tasks/working/actions-task.json', file=open(os.environ['GITHUB_ENV'],'a'))
          else:
              raw_path='''${{ inputs.task_path }}'''.strip()
              p=pathlib.PurePosixPath(raw_path)
              if not raw_path:
                  raise SystemExit('task_path is required when task_json is empty')
              if p.is_absolute() or '..' in p.parts or p.parts[:1] != ('tasks',):
                  raise SystemExit('task_path must be a repository-relative path under tasks/, e.g. tasks/inbox/FACT-285A-RETRY-001.json')
              if len(p.parts) < 3 or p.parts[1] != 'inbox':
                  raise SystemExit('task_path must include the tasks/inbox/ prefix, e.g. tasks/inbox/FACT-285A-RETRY-001.json')
              if not pathlib.Path(p).is_file():
                  raise SystemExit(f'task_path does not exist: {p}')
              
              data=json.loads(pathlib.Path(p).read_text(encoding='utf-8'))
              data['requested_fact_pack_only']=json.loads('''${{ toJson(inputs.fact_pack_only) }}''')
              data['effective_fact_pack_only']=json.loads('''${{ toJson(inputs.fact_pack_only) }}''')
              data['fact_pack_only']=json.loads('''${{ toJson(inputs.fact_pack_only) }}''')
              mode='${{ inputs.analysis_mode }}'
              wf={'smoke':'investment_analysis_free','verified_lite':'investment_analysis_verified_lite','full_5_agent':'investment_analysis'}.get(mode, data.get('workflow') or 'investment_analysis_verified_lite')
              data['workflow']=wf
              out=pathlib.Path('tasks/working/actions-task.json'); out.parent.mkdir(parents=True,exist_ok=True); out.write_text(json.dumps(data,ensure_ascii=False,indent=2),encoding='utf-8')
              print('TASK_FILE=tasks/working/actions-task.json', file=open(os.environ['GITHUB_ENV'],'a'))
      - name: Validate Gemini secret
        if: ${{ inputs.executor == 'gemini' }}
        run: |
          test -n "$GEMINI_API_KEY" || (echo "GEMINI_API_KEY GitHub Secret is required for executor=gemini" >&2; exit 1)
      - name: Gemini one-call smoke test
        if: ${{ inputs.executor == 'gemini' && inputs.gemini_smoke_test }}
        run: python -m orchestrator.cli gemini-smoke-test
      - name: Doctor and validation
        if: ${{ !inputs.gemini_smoke_test }}
        run: |
          python -m orchestrator.cli doctor
          python -m orchestrator.cli validate-agents
          python -m orchestrator.cli validate-workflows
          python -m orchestrator.cli validate-task "$TASK_FILE"
      - name: Run orchestrator
        if: ${{ !inputs.gemini_smoke_test && inputs.analysis_mode != 'smoke' }}
        id: run
        shell: bash
        run: |
          set -euo pipefail
          DRY=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="--dry-run"; fi
          python -m orchestrator.cli run "$TASK_FILE" --executor "${{ inputs.executor }}" $DRY \
            --json-output hos-run-result.json
          RUN_ID=$(python scripts/extract_hos_run_id.py hos-run-result.json)
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
      - name: Smoke test bundle
        if: always()
        run: |
          python -m orchestrator.cli list-runs || true
          test -d "runs/${{ steps.run.outputs.run_id }}" || true
      - name: Step summary
        if: always()
        run: |
          echo "## HOS AI Company" >> "$GITHUB_STEP_SUMMARY"
          echo "Run ID: ${{ steps.run.outputs.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Executor: ${{ inputs.executor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Fact mode: ${{ inputs.fact_mode }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Network facts enabled: $HOS_ENABLE_NETWORK_FACTS" >> "$GITHUB_STEP_SUMMARY"
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, pathlib
          run='${{ steps.run.outputs.run_id }}'
          summary=pathlib.Path('runs')/run/'diagnostics'/'fact_pack_only_summary.json'
          gate=pathlib.Path('runs')/run/'diagnostics'/'data_sufficiency_gate.json'
          fp=pathlib.Path('runs')/run/'fact_pack.json'
          data={}
          if summary.exists():
              data=json.loads(summary.read_text())
          elif fp.exists():
              pack=json.loads(fp.read_text())
              g=json.loads(gate.read_text()) if gate.exists() else {}
              data={'fact_pack_status':g.get('status'),'verified_source_count':pack.get('data_quality',{}).get('verified_sources_count'),'missing_fields':pack.get('data_quality',{}).get('missing_fields'),'final_decision':g.get('final_decision') or g.get('status')}
          for k,label in [('fact_pack_status','Fact Pack status'),('verified_source_count','Verified source count'),('missing_fields','Missing fields'),('final_decision','Final decision')]:
              print(f"{label}: {data.get(k)}")
          PY
      - name: Upload run bundle
        if: ${{ always() && !inputs.gemini_smoke_test && steps.run.outputs.run_id != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: hos-run-${{ steps.run.outputs.run_id }}
          path: |
            runs/${{ steps.run.outputs.run_id }}/
            runs/${{ steps.run.outputs.run_id }}/usage.json
            runs/${{ steps.run.outputs.run_id }}/fact_pack.json
            runs/${{ steps.run.outputs.run_id }}/source_map.json
            runs/${{ steps.run.outputs.run_id }}/discord_message.txt
            runs/${{ steps.run.outputs.run_id }}/investment_commander_update.json
            outputs/index.json
            hos-run-result.json
          if-no-files-found: warn

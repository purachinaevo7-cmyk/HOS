name: Investment Agent

on:
  schedule:
    # 07:00 JST on weekdays (22:00 UTC previous day, Monday-Friday JST)
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

jobs:
  daily-stock-check:
    runs-on: ubuntu-latest
    env:
      ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
      JPX_TOPIX_CSV_URL: ${{ secrets.JPX_TOPIX_CSV_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requirements
        run: python -m pip install -r requirements.txt

      - name: Run investment agent
        run: python skills/investment-agent/daily_stock_check.py

      - name: Upload daily prices
        uses: actions/upload-artifact@v4
        with:
          name: daily-prices
          path: skills/investment-agent/data/daily_prices/*.json

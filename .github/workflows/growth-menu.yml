name: Morning Growth Menu

on:
  schedule:
    - cron: '30 20 * * *' # 05:30 JST on the following calendar day
  workflow_dispatch:
    inputs:
      target_date:
        description: 'YYYY-MM-DD in Asia/Tokyo; blank means today'
        required: false
        type: string
      offline:
        description: 'Use deterministic fixture without OpenAI API'
        required: true
        default: false
        type: boolean
  pull_request:
    paths:
      - 'skills/growth-menu/**'
      - '.github/workflows/growth-menu.yml'
      - 'requirements.txt'
      - 'docs/GROWTH_MENU_LOOP_OPERATIONS.md'

permissions:
  contents: write

concurrency:
  group: morning-growth-menu
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Unit tests
        run: python -m unittest discover -s skills/growth-menu/tests -p 'test_*.py'
      - name: Offline generation smoke test
        run: |
          rm -rf /tmp/growth-menu-smoke
          python skills/growth-menu/generate_growth_menu.py \
            --offline \
            --date 2026-07-20 \
            --output-dir /tmp/growth-menu-smoke
          python skills/growth-menu/audit_growth_menu.py \
            --date 2026-07-20 \
            --output-dir /tmp/growth-menu-smoke \
            --write-report

  generate:
    if: ${{ github.event_name != 'pull_request' }}
    needs: validate
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Resolve target date
        id: date
        shell: bash
        run: |
          set -euo pipefail
          DATE_INPUT='${{ inputs.target_date }}'
          if [ -z "$DATE_INPUT" ]; then
            DATE_INPUT=$(TZ=Asia/Tokyo date +%F)
          fi
          python - <<PY
          from datetime import date
          date.fromisoformat('$DATE_INPUT')
          PY
          echo "value=$DATE_INPUT" >> "$GITHUB_OUTPUT"
      - name: Validate OpenAI secret
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.offline) }}
        run: test -n "$OPENAI_API_KEY" || (echo 'OPENAI_API_KEY secret is required' >&2; exit 1)
      - name: Generate PowerPoint
        shell: bash
        run: |
          set -euo pipefail
          OFFLINE=''
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ] && [ '${{ inputs.offline }}' = 'true' ]; then
            OFFLINE='--offline'
          fi
          python skills/growth-menu/generate_growth_menu.py \
            --date '${{ steps.date.outputs.value }}' \
            $OFFLINE
      - name: Audit generated package
        run: |
          python skills/growth-menu/audit_growth_menu.py \
            --date '${{ steps.date.outputs.value }}' \
            --write-report
      - name: Commit audited outputs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'hos-growth-menu-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add outputs/growth-menu
          if git diff --cached --quiet; then
            echo 'No generated changes to commit.'
            exit 0
          fi
          git commit -m "Generate growth menu ${{ steps.date.outputs.value }}"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Upload generated package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: growth-menu-${{ steps.date.outputs.value }}
          path: |
            outputs/growth-menu/latest.pptx
            outputs/growth-menu/latest.json
            outputs/growth-menu/latest_notification.md
            outputs/growth-menu/audit/latest.json
          if-no-files-found: error
          retention-days: 30
      - name: Job summary
        if: always()
        run: |
          echo '## Morning Growth Menu' >> "$GITHUB_STEP_SUMMARY"
          echo 'Date: ${{ steps.date.outputs.value }}' >> "$GITHUB_STEP_SUMMARY"
          if [ -f outputs/growth-menu/audit/latest.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          report=json.loads(Path('outputs/growth-menu/audit/latest.json').read_text())
          print(f"Audit: {report.get('status')}")
          print(f"Failures: {report.get('failure_count')}")
          PY
          fi

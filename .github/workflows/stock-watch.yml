name: Stock Watch

on:
  schedule:
    # 21:00 JST on weekdays = 12:00 UTC
    - cron: '0 12 * * 1-5'
    # 07:00 JST on weekdays = 22:00 UTC previous day
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

jobs:
  stock-watch:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requirements
        run: python -m pip install -r requirements.txt

      - name: Run stock watch
        run: |
          set -o pipefail
          mkdir -p logs
          if [ "${{ github.event.schedule }}" = "0 22 * * 0-4" ]; then
            MODE=morning-retry
          else
            MODE=evening
          fi
          python skills/investment-agent/daily_stock_check.py --mode "$MODE" 2>&1 | tee logs/stock-watch.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-watch-logs
          path: logs/
          if-no-files-found: warn

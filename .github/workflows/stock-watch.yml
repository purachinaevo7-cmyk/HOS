name: Stock Watch

on:
  schedule:
    # 18:00 JST on weekdays (09:00 UTC, Monday-Friday)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  stock-watch:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requirements
        run: python -m pip install -r requirements.txt

      - name: Run stock watch
        run: |
          set -o pipefail
          mkdir -p logs
          python skills/investment-agent/daily_stock_check.py 2>&1 | tee logs/stock-watch.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-watch-logs
          path: logs/
          if-no-files-found: warn

agents:
  - id: ceo
    display_name: CEO
    role: Request framing, assignment, quality judgment, and final Markdown integration.
    prompt_path: agents/ceo.md
    version: 1.0.0
    enabled: true
    model_provider: mock
    model: hos-mock-v1
    temperature: 0.2
    max_output_tokens: 3000
    timeout_seconds: 30
    allowed_tools: []
    output_schema: schemas/agent_outputs/ceo.schema.json
    tags: [core, executive]
  - id: researcher
    display_name: Researcher
    role: Structures facts, source needs, and missing information.
    prompt_path: agents/researcher.md
    version: 1.0.0
    enabled: true
    model_provider: mock
    model: hos-mock-v1
    temperature: 0.1
    max_output_tokens: 3000
    timeout_seconds: 30
    allowed_tools: []
    output_schema: schemas/agent_outputs/researcher.schema.json
    tags: [investment, research]
